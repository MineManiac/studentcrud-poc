<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Cadastro de Alunos</h1>
      </div>
      <div class="status-pill" id="status">Conectando...</div>
    </header>

    <main class="shell">
      <section class="form-section" aria-labelledby="form-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Formulario</p>
            <h2 id="form-title">Novo aluno</h2>
          </div>
          <button class="ghost-button" id="clearButton" type="button">Limpar</button>
        </div>

        <form id="studentForm" autocomplete="off">
          <input type="hidden" id="studentId" />

          <label>
            Nome
            <input id="nome" name="nome" type="text" maxlength="120" required />
          </label>

          <label>
            Data de nascimento
            <input
              id="dataNascimento"
              name="dataNascimento"
              type="date"
              min="1900-01-01"
              required
            />
          </label>

          <fieldset>
            <legend>Endereco completo</legend>

            <div class="field-grid">
              <label>
                CEP
                <input id="cep" name="cep" type="text" maxlength="12" required />
              </label>
              <label>
                Estado
                <input id="estado" name="estado" type="text" maxlength="2" required />
              </label>
            </div>

            <label>
              Logradouro
              <input id="logradouro" name="logradouro" type="text" maxlength="120" required />
            </label>

            <div class="field-grid">
              <label>
                Numero
                <input id="numero" name="numero" type="text" maxlength="20" required />
              </label>
              <label>
                Complemento
                <input id="complemento" name="complemento" type="text" maxlength="80" />
              </label>
            </div>

            <div class="field-grid">
              <label>
                Bairro
                <input id="bairro" name="bairro" type="text" maxlength="80" required />
              </label>
              <label>
                Cidade
                <input id="cidade" name="cidade" type="text" maxlength="80" required />
              </label>
            </div>
          </fieldset>

          <button class="primary-button" id="submitButton" type="submit">Cadastrar aluno</button>
        </form>
      </section>

      <section class="grid-section" aria-labelledby="grid-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Grid</p>
            <h2 id="grid-title">Alunos cadastrados</h2>
          </div>
          <span class="count" id="studentCount">0 registros</span>
        </div>

        <div class="message" id="message" role="status"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>
                  <button
                    class="sort-button"
                    data-sort-key="codigo"
                    data-sort-label="codigo"
                    type="button"
                    aria-label="Ordenar codigo"
                  >
                    Codigo <span class="sort-indicator"></span>
                  </button>
                </th>
                <th>Nome</th>
                <th>
                  <button
                    class="sort-button"
                    data-sort-key="dataNascimento"
                    data-sort-label="data de nascimento"
                    type="button"
                    aria-label="Ordenar data de nascimento"
                  >
                    Nascimento <span class="sort-indicator"></span>
                  </button>
                </th>
                <th>Endereco</th>
                <th>
                  <button
                    class="sort-button"
                    data-sort-key="dataCadastro"
                    data-sort-label="data de cadastro"
                    type="button"
                    aria-label="Ordenar data de cadastro"
                  >
                    Data cadastro <span class="sort-indicator"></span>
                  </button>
                </th>
                <th>
                  <button
                    class="sort-button"
                    data-sort-key="ultimoUpdate"
                    data-sort-label="ultimo update"
                    type="button"
                    aria-label="Ordenar ultimo update"
                  >
                    Ultimo update <span class="sort-indicator"></span>
                  </button>
                </th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody id="studentsBody">
              <tr>
                <td colspan="7" class="empty">Carregando registros...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
